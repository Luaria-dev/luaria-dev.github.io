<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos | Fuego y Sabor</title>
  <meta name="description" content="Catálogo de salsas picantes, chiles, condimentos y combos." />

  <style>
    :root {
      --rojo-fuerte: #db0e0e;
      --rojo-medio: #db3434;
      --rojo-suave: #eb7575;
      --verde-fuerte: #37f360;
      --verde-suave: #7cf797;
      --fondo: #300808;
      --fondo-oscuro: #160303;
      --texto: #fff7f2;
      --texto-suave: #ffd8d0;
      --tarjeta: rgba(255, 255, 255, 0.08);
      --borde: rgba(255, 255, 255, 0.14);
      --sombra: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(219, 14, 14, 0.35), transparent 32%),
        radial-gradient(circle at bottom right, rgba(55, 243, 96, 0.14), transparent 28%),
        linear-gradient(135deg, var(--fondo), var(--fondo-oscuro));
      color: var(--texto);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rojo-fuerte), var(--rojo-suave));
      box-shadow: 0 12px 30px rgba(219, 14, 14, 0.35);
      font-size: 24px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--texto-suave);
      font-weight: 800;
      font-size: 0.95rem;
    }

    .nav a:hover {
      color: var(--verde-suave);
    }

    .page-hero {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 26px;
    }

    .tagline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(124, 247, 151, 0.45);
      border-radius: 999px;
      color: var(--verde-suave);
      background: rgba(55, 243, 96, 0.09);
      font-size: 0.92rem;
      font-weight: 900;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: -2px;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    h1 span {
      display: block;
      color: var(--verde-suave);
    }

    .hero-text {
      color: var(--texto-suave);
      max-width: 760px;
      line-height: 1.7;
      font-size: 1.08rem;
    }

    .market-layout {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 70px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 22px;
      align-items: start;
    }

    .filters-panel,
    .market-panel {
      border-radius: 28px;
      background: var(--tarjeta);
      border: 1px solid var(--borde);
      box-shadow: 0 24px 50px var(--sombra);
      backdrop-filter: blur(12px);
    }

    .filters-panel {
      padding: 22px;
      position: sticky;
      top: 16px;
    }

    .filters-panel h2 {
      font-size: 1.35rem;
      margin-bottom: 16px;
    }

    .filter-group {
      margin-bottom: 18px;
    }

    .filter-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--texto-suave);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .input,
    .select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 13px 14px;
      background: rgba(0,0,0,0.24);
      color: var(--texto);
      outline: none;
      font-size: 0.95rem;
    }

    .input:focus,
    .select:focus {
      border-color: var(--verde-suave);
      box-shadow: 0 0 0 3px rgba(55, 243, 96, 0.15);
    }

    .select option {
      color: #111;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .clear-button {
      width: 100%;
      min-height: 44px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--rojo-fuerte), var(--rojo-suave));
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(219, 14, 14, 0.22);
    }

    .market-panel {
      padding: 22px;
      min-height: 520px;
    }

    .market-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .result-count {
      color: var(--texto-suave);
      font-weight: 800;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .product-card {
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.13);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 40px rgba(0,0,0,0.32);
    }

    .product-image-wrap {
      height: 210px;
      background:
        radial-gradient(circle at center, rgba(235,117,117,0.28), transparent 55%),
        rgba(0,0,0,0.22);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      cursor: zoom-in;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 12px;
      position: relative;
      z-index: 1;
    }

    .image-placeholder {
      font-size: 4rem;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
      position: relative;
      z-index: 1;
    }

    .category-badge {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 2;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(22, 3, 3, 0.72);
      border: 1px solid rgba(255,255,255,0.16);
      color: var(--verde-suave);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .product-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      position: relative;
      z-index: 3;
      background: rgba(22, 3, 3, 0.78);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .product-title {
      font-size: 1.12rem;
      line-height: 1.25;
    }

    .product-description {
      color: var(--texto-suave);
      font-size: 0.92rem;
      line-height: 1.45;
      flex: 1;
    }

    .product-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .price {
      font-size: 1.25rem;
      font-weight: 950;
      color: white;
    }

    .heat {
      white-space: nowrap;
      letter-spacing: -2px;
    }

    .buy-button {
      margin-top: 8px;
      min-height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(55, 243, 96, 0.13);
      border: 1px solid rgba(124, 247, 151, 0.35);
      color: var(--verde-suave);
      font-weight: 900;
    }

    .buy-button:hover {
      background: rgba(55, 243, 96, 0.2);
    }

    .status-message {
      color: var(--texto-suave);
      line-height: 1.6;
      padding: 18px;
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(8px);
    }

    .image-modal.is-open {
      display: flex;
    }

    .image-modal-content {
      position: relative;
      width: min(900px, 96vw);
      max-height: 90vh;
      border-radius: 28px;
      padding: 20px;
      background: rgba(48, 8, 8, 0.95);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    }

    .image-modal img {
      width: 100%;
      max-height: 76vh;
      object-fit: contain;
      display: block;
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
    }

    .image-modal-title {
      margin-top: 12px;
      color: var(--texto-suave);
      text-align: center;
      font-weight: 800;
    }

    .image-modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--rojo-fuerte), var(--rojo-suave));
      color: white;
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    }

    .whatsapp-floating {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--verde-fuerte), var(--verde-suave));
      color: #06240c;
      font-size: 1.8rem;
      box-shadow: 0 18px 34px rgba(55,243,96,0.25);
      font-weight: 900;
    }

    @media (max-width: 1000px) {
      .market-layout {
        grid-template-columns: 1fr;
      }

      .filters-panel {
        position: static;
      }

      .products-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        flex-wrap: wrap;
        gap: 14px;
      }

      .market-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .products-grid {
        grid-template-columns: 1fr;
      }

      .range-row {
        grid-template-columns: 1fr;
      }

      .image-modal-close {
        top: 8px;
        right: 8px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Ir al inicio">
      <span class="brand-icon">🌶️</span>
      <span>My Tierra Picante</span>
    </a>

    <nav class="nav" aria-label="Menú principal">
      <a href="index.html">Inicio</a>
      <a href="index.html#contacto">Contacto</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="tagline">🛒 Mini market picante</div>
      <h1>
        Catálogo de productos
        <span>Echos con AMOR.</span>
      </h1>

    </section>

    <section class="market-layout">
      <aside class="filters-panel" aria-label="Filtros de productos">
        <h2>Filtrar productos</h2>

        <div class="filter-group">
          <label for="searchInput">Buscar por nombre</label>
          <input class="input" id="searchInput" type="search" placeholder="Ej: habanero, tabasco..." />
        </div>

        <div class="filter-group">
          <label for="categorySelect">Categoría</label>
          <select class="select" id="categorySelect">
            <option value="">Todas</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="heatSelect">Nivel de picor</label>
          <select class="select" id="heatSelect">
            <option value="">Todos</option>
            <option value="1">🌶️ Nivel 1</option>
            <option value="2">🌶️🌶️ Nivel 2</option>
            <option value="3">🌶️🌶️🌶️ Nivel 3</option>
            <option value="4">🌶️🌶️🌶️🌶️ Nivel 4</option>
            <option value="5">🌶️🌶️🌶️🌶️🌶️ Nivel 5</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Rango de precio</label>
          <div class="range-row">
            <input class="input" id="minPriceInput" type="number" min="0" placeholder="Mín." />
            <input class="input" id="maxPriceInput" type="number" min="0" placeholder="Máx." />
          </div>
        </div>

        <div class="filter-group">
          <label for="sortSelect">Ordenar</label>
          <select class="select" id="sortSelect">
            <option value="nombre-asc">Nombre A-Z</option>
            <option value="precio-asc">Precio menor a mayor</option>
            <option value="precio-desc">Precio mayor a menor</option>
            <option value="picor-desc">Más picante primero</option>
          </select>
        </div>

        <button class="clear-button" id="clearButton" type="button">Limpiar filtros</button>
      </aside>

      <section class="market-panel" aria-live="polite">
        <div class="market-top">
          <h2>Productos disponibles</h2>
          <p class="result-count" id="resultCount">Cargando productos...</p>
        </div>

        <div class="products-grid" id="productsGrid"></div>
      </section>
    </section>
  </main>

  <a class="whatsapp-floating" href="https://wa.me/50600000000" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">✆</a>

  <div class="image-modal" id="imageModal" aria-hidden="true">
    <div class="image-modal-content" role="dialog" aria-modal="true" aria-label="Imagen ampliada del producto">
      <button class="image-modal-close" id="imageModalClose" type="button" aria-label="Cerrar imagen">×</button>
      <img id="imageModalImg" src="" alt="" />
      <p class="image-modal-title" id="imageModalTitle"></p>
    </div>
  </div>

  <script>
    const CSV_FILE = "productos.csv";
    const WHATSAPP_NUMBER = "50600000000";

    const productsGrid = document.getElementById("productsGrid");
    const resultCount = document.getElementById("resultCount");
    const searchInput = document.getElementById("searchInput");
    const categorySelect = document.getElementById("categorySelect");
    const heatSelect = document.getElementById("heatSelect");
    const minPriceInput = document.getElementById("minPriceInput");
    const maxPriceInput = document.getElementById("maxPriceInput");
    const sortSelect = document.getElementById("sortSelect");
    const clearButton = document.getElementById("clearButton");
    const imageModal = document.getElementById("imageModal");
    const imageModalImg = document.getElementById("imageModalImg");
    const imageModalTitle = document.getElementById("imageModalTitle");
    const imageModalClose = document.getElementById("imageModalClose");

    let products = [];

    document.addEventListener("DOMContentLoaded", loadProducts);

    async function loadProducts() {
      try {
        const response = await fetch(CSV_FILE);

        if (!response.ok) {
          throw new Error("No se pudo cargar el archivo productos.csv");
        }

        const csvText = await response.text();
        products = parseCSV(csvText).map(cleanProduct).filter(product => product.nombre);

        fillCategories(products);
        renderProducts();
        activateFilters();
      } catch (error) {
        productsGrid.innerHTML = `
          <p class="status-message">
            No se pudieron cargar los productos. Revisa que exista un archivo llamado <strong>productos.csv</strong> en la misma carpeta que esta página.
            <br><br>
            Detalle: ${error.message}
          </p>
        `;
        resultCount.textContent = "0 productos";
      }
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue.trim());
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue || currentRow.length) {
            currentRow.push(currentValue.trim());
            rows.push(currentRow);
            currentRow = [];
            currentValue = "";
          }

          if (char === "\r" && nextChar === "\n") {
            i++;
          }
        } else {
          currentValue += char;
        }
      }

      if (currentValue || currentRow.length) {
        currentRow.push(currentValue.trim());
        rows.push(currentRow);
      }

      const headers = rows.shift().map(header => normalizeKey(header));

      return rows.map(row => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = row[index] || "";
        });
        return item;
      });
    }

    function normalizeKey(key) {
      return key
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "_");
    }

    function cleanProduct(product) {
      return {
        nombre: product.nombre || "",
        precio: Number(String(product.precio || "0").replace(/[^0-9.]/g, "")) || 0,
        picor: Number(product.picor) || 1,
        imagen: product.imagen || product.nombre_de_la_imagen || "",
        descripcion: product.descripcion || "",
        categoria: product.categoria || "Sin categoría"
      };
    }

    function fillCategories(items) {
      const categories = [...new Set(items.map(item => item.categoria).filter(Boolean))].sort();

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });
    }

    function activateFilters() {
      [searchInput, categorySelect, heatSelect, minPriceInput, maxPriceInput, sortSelect].forEach(element => {
        element.addEventListener("input", renderProducts);
        element.addEventListener("change", renderProducts);
      });

      clearButton.addEventListener("click", () => {
        searchInput.value = "";
        categorySelect.value = "";
        heatSelect.value = "";
        minPriceInput.value = "";
        maxPriceInput.value = "";
        sortSelect.value = "nombre-asc";
        renderProducts();
      });
    }

    function renderProducts() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const selectedCategory = categorySelect.value;
      const selectedHeat = Number(heatSelect.value) || 0;
      const minPrice = Number(minPriceInput.value) || 0;
      const maxPrice = Number(maxPriceInput.value) || Infinity;

      let filtered = products.filter(product => {
        const matchesSearch =
          product.nombre.toLowerCase().includes(searchTerm) ||
          product.descripcion.toLowerCase().includes(searchTerm) ||
          product.categoria.toLowerCase().includes(searchTerm);

        const matchesCategory = !selectedCategory || product.categoria === selectedCategory;
        const matchesHeat = !selectedHeat || product.picor === selectedHeat;
        const matchesPrice = product.precio >= minPrice && product.precio <= maxPrice;

        return matchesSearch && matchesCategory && matchesHeat && matchesPrice;
      });

      filtered = sortProducts(filtered, sortSelect.value);

      resultCount.textContent = `${filtered.length} producto${filtered.length === 1 ? "" : "s"}`;

      if (!filtered.length) {
        productsGrid.innerHTML = `<p class="status-message">No se encontraron productos con esos filtros.</p>`;
        return;
      }

      productsGrid.innerHTML = filtered.map(createProductCard).join("");
    }

    function sortProducts(items, sortValue) {
      const sorted = [...items];

      if (sortValue === "precio-asc") {
        sorted.sort((a, b) => a.precio - b.precio);
      } else if (sortValue === "precio-desc") {
        sorted.sort((a, b) => b.precio - a.precio);
      } else if (sortValue === "picor-desc") {
        sorted.sort((a, b) => b.picor - a.picor);
      } else {
        sorted.sort((a, b) => a.nombre.localeCompare(b.nombre));
      }

      return sorted;
    }

    function createProductCard(product) {
      const imagePath = product.imagen ? `imagenes/${escapeHTML(product.imagen)}` : "";
      const imageHTML = product.imagen
        ? `<img class="product-image" src="${imagePath}" alt="${escapeHTML(product.nombre)}" onclick="openImageModal('${imagePath}', '${escapeHTML(product.nombre)}')" onerror="this.remove(); this.parentElement.insertAdjacentHTML('beforeend', '<span class=&quot;image-placeholder&quot;>🌶️</span>')" />`
        : `<span class="image-placeholder">🌶️</span>`;

      const message = encodeURIComponent(`Hola, quiero consultar por este producto: ${product.nombre}`);
      const whatsappLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;

      return `
        <article class="product-card">
          <div class="product-image-wrap">
            <span class="category-badge">${escapeHTML(product.categoria)}</span>
            ${imageHTML}
          </div>

          <div class="product-body">
            <h3 class="product-title">${escapeHTML(product.nombre)}</h3>
            <p class="product-description">${escapeHTML(product.descripcion)}</p>

            <div class="product-meta">
              <span class="price">₡${formatPrice(product.precio)}</span>
              <span class="heat" title="Nivel de picor ${product.picor}">${createHeat(product.picor)}</span>
            </div>

            <a class="buy-button" href="${whatsappLink}" target="_blank" rel="noopener">Consultar por WhatsApp</a>
          </div>
        </article>
      `;
    }

    function openImageModal(src, title) {
      imageModalImg.src = src;
      imageModalImg.alt = title;
      imageModalTitle.textContent = title;
      imageModal.classList.add("is-open");
      imageModal.setAttribute("aria-hidden", "false");
    }

    function closeImageModal() {
      imageModal.classList.remove("is-open");
      imageModal.setAttribute("aria-hidden", "true");
      imageModalImg.src = "";
      imageModalImg.alt = "";
      imageModalTitle.textContent = "";
    }

    imageModalClose.addEventListener("click", closeImageModal);

    imageModal.addEventListener("click", event => {
      if (event.target === imageModal) {
        closeImageModal();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && imageModal.classList.contains("is-open")) {
        closeImageModal();
      }
    });

    function createHeat(level) {
      const safeLevel = Math.max(1, Math.min(Number(level) || 1, 5));
      return "🌶️".repeat(safeLevel);
    }

    function formatPrice(price) {
      return new Intl.NumberFormat("es-CR").format(price);
    }

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
